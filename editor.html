<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Poster Editor</title>

    <link rel="stylesheet" href="css/fonts.css">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="css/font-library.css">
<link rel="stylesheet" href="css/text-effects.css">
  </head>

  <body>
    <div class="editor-layout">
      <!-- LEFT TOOLBAR -->
      <aside class="main-toolbar">
        <button onclick="openPanel('textPanel')">✏️</button>

        <button onclick="openPanel('assetsPanel')">🧩</button>

        <button onclick="openPanel('imagePanel')">🖼️</button>

        <button onclick="openPanel('backgroundPanel')">🎨</button>

        <button onclick="openPanel('layersPanel')">📚</button>
      </aside>

      <!-- FLOATING PANEL -->
      <aside class="side-panel" id="sidePanel">
        <button class="panel-close" onclick="closePanel()">×</button>

        <div id="panelResizeHandle" class="panel-resize-handle"></div>

        <!-- TEXT -->
        <div class="panel" id="textPanel">
          <div class="panel-header">
            <h3>Text</h3>
            <button class="panel-close" onclick="closePanel()">×</button>
          </div>

          <button class="add-btn" onclick="addText()">+ Add Text</button>

          <input type="text" id="textInput" placeholder="Edit text" />

          <div class="mini-grid">
            <button onclick="toggleBold()">B</button>

            <button onclick="toggleItalic()">I</button>

            <button onclick="makeUppercase()">AA</button>

            <button onclick="applyTextShadow()">Shadow</button>
          </div>

          <div class="mini-grid">
            <button onclick="flipSelectedX()">Flip X</button>
            <button onclick="flipSelectedY()">Flip Y</button>
          </div>

          <button onclick="triggerTextImageFillUpload()">
            Upload Text Texture
          </button>

          <input type="file" id="textTextureUpload" hidden />

          <label>Text Opacity</label>
          <input
            type="range"
            id="textOpacityInput"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <label>Text Border Size</label>
          <input
            type="range"
            id="textStrokeSizeInput"
            min="0"
            max="12"
            value="0"
          />

          <label>Border Opacity</label>
          <input
            type="range"
            id="textStrokeOpacityInput"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <label>Text Border Color</label>
          <input type="color" id="textStrokeColorInput" value="#000000" />

          <label>Text Background Color</label>
          <input type="color" id="textBgColorInput" value="#000000" />

          <label>Text Background Opacity</label>
          <input
            type="range"
            id="textBgOpacityInput"
            min="0"
            max="1"
            step="0.05"
            value="0"
          />

          <h4>Custom Gradient</h4>

          <label>Gradient Color 1</label>
          <input type="color" id="gradientColor1" value="#ffcc00" />

          <label>Gradient Color 2</label>
          <input type="color" id="gradientColor2" value="#ff2d2d" />

          <label>Gradient Style</label>

          <select id="gradientDirection">
            <option value="horizontal">Horizontal</option>

            <option value="vertical">Vertical</option>

            <option value="diagonal">Diagonal</option>

            <option value="radial">Radial</option>
          </select>

          <button onclick="applyCustomTextGradient()">Apply Gradient</button>

          <h4>Gradient Text Styles</h4>

          <div id="textGradientGrid" class="text-gradient-grid"></div>

          <input type="color" id="colorInput" />

          <input type="range" id="fontSizeInput" min="10" max="220" />

          <input type="range" id="letterSpacingInput" min="-20" max="300" />

          <div id="fontGrid" class="font-grid"></div>

          <div id="textStyleGrid" class="text-style-grid"></div>
        </div>

        <!-- ASSETS -->
        <div class="panel" id="assetsPanel">
          <div class="asset-section">
            <h4>Shapes</h4>

            <div class="asset-grid">
              <button onclick="addShape('circle')">Circle</button>
              <button onclick="addShape('rect')">Box</button>
              <button onclick="addShape('roundRect')">Round Box</button>
              <button onclick="addShape('line')">Line</button>
              <button onclick="addShape('triangle')">Triangle</button>
              <button onclick="addShape('star')">Star</button>
              <button onclick="addShape('diamond')">Diamond</button>
              <button onclick="addShape('pill')">Pill</button>
            </div>
          </div>
          <div class="asset-section">
            <h4>Badges</h4>

            <div class="asset-section">
              <h4>Offer Badges</h4>

              <div id="badgeGrid" class="badge-grid"></div>

              <div class="badge-grid">
                <div
                  class="badge-card badge-gold"
                  onclick="addBadgeStyle('gold')"
                >
                  50% OFF
                </div>

                <div
                  class="badge-card badge-red"
                  onclick="addBadgeStyle('red')"
                >
                  SALE
                </div>

                <div
                  class="badge-card badge-neon"
                  onclick="addBadgeStyle('neon')"
                >
                  NEW
                </div>

                <div
                  class="badge-card badge-glass"
                  onclick="addBadgeStyle('glass')"
                >
                  FREE
                </div>

                <div
                  class="badge-card badge-black"
                  onclick="addBadgeStyle('black')"
                >
                  LIMITED
                </div>

                <div
                  class="badge-card badge-pink"
                  onclick="addBadgeStyle('pink')"
                >
                  OFFER
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- IMAGE -->
        <div class="panel" id="imagePanel">
          <div class="panel-header">
            <h3>Images</h3>
          </div>

          <button onclick="triggerImageUpload()">Upload Image</button>

          <button onclick="triggerLogoUpload()">Upload Logo</button>

          <div class="image-filter-library">
            <h4>Image Styles</h4>
            <div id="imageFilterGrid" class="image-filter-grid"></div>
          </div>

          <label>Image Opacity</label>
          <input
            type="range"
            id="imageOpacityInput"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <div class="mini-grid">
            <button onclick="flipSelectedX()">Flip X</button>
            <button onclick="flipSelectedY()">Flip Y</button>
          </div>

          <h4>Image Effects</h4>

          <label>Shadow Blur</label>
          <input
            type="range"
            id="imageShadowBlur"
            min="0"
            max="100"
            value="25"
          />

          <label>Shadow X Position</label>
          <input type="range" id="imageShadowX" min="-60" max="60" value="0" />

          <label>Shadow Y Position</label>
          <input type="range" id="imageShadowY" min="-60" max="60" value="12" />

          <label>Shadow Color</label>
          <input type="color" id="imageShadowColor" value="#000000" />

          <button onclick="removeImageEffects()">Reset Image</button>
        </div>

        <!-- BG -->
        <div class="panel" id="backgroundPanel">
          <div class="panel-header">
            <h3>Background</h3>
          </div>

          <input type="color" id="bgColorInput" />

          <button onclick="applyBackgroundColor()">Apply Color</button>

          <button onclick="triggerBgUpload()">Upload BG</button>

          <h4>Background Gradient</h4>

          <label>BG Gradient Color 1</label>
          <input type="color" id="bgGradientColor1" value="#111111" />

          <label>BG Gradient Color 2</label>
          <input type="color" id="bgGradientColor2" value="#2f6bff" />

          <label>BG Gradient Style</label>

          <select id="bgGradientDirection">
            <option value="horizontal">Horizontal</option>

            <option value="vertical">Vertical</option>

            <option value="diagonal">Diagonal</option>

            <option value="radial">Radial</option>
          </select>

          <button onclick="applyCustomBackgroundGradient()">
            Apply Background Gradient
          </button>
        </div>

        <!-- LAYERS -->
        <div class="panel" id="layersPanel">
          <div class="panel-header">
            <h3>Layers</h3>
          </div>

          <div id="layerList"></div>
        </div>

        <!-- Project panal -->

        <div class="panel" id="projectsPanel">
          <div class="panel-header">
            <h3>Projects</h3>
            <button class="panel-close" onclick="closePanel()">×</button>
          </div>

          <div id="projectsList"></div>
        </div>

        <!-- style panel -->
        <div class="panel" id="stylePanel">
          <div class="panel-header">
            <h3>Style</h3>
            <button class="panel-close" onclick="closePanel()">×</button>
          </div>

          <label>Corner Radius</label>
          <input
            type="range"
            id="objectRadiusInput"
            min="0"
            max="200"
            value="0"
          />

          <label>Fill / Main Color</label>
          <input type="color" id="objectFillColor" value="#ffffff" />

          <label>Opacity / Transparency</label>
          <label>Fill Opacity</label>
          <input
            type="range"
            id="objectFillOpacity"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <label>Border Opacity</label>
          <input
            type="range"
            id="objectBorderOpacity"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <label>Text Opacity</label>
          <input
            type="range"
            id="badgeTextOpacityInput"
            min="0"
            max="1"
            step="0.05"
            value="1"
          />

          <label>Border Size</label>
          <input
            type="range"
            id="objectBorderSize"
            min="0"
            max="40"
            value="0"
          />

          <label>Border Color</label>
          <input type="color" id="objectBorderColor" value="#ffffff" />

          <label>Shadow Blur</label>
          <input
            type="range"
            id="objectShadowBlur"
            min="0"
            max="100"
            value="0"
          />

          <label>Shadow X</label>
          <input type="range" id="objectShadowX" min="-60" max="60" value="0" />

          <label>Shadow Y</label>
          <input type="range" id="objectShadowY" min="-60" max="60" value="0" />

          <label>Shadow Color</label>
          <input type="color" id="objectShadowColor" value="#000000" />

          <button onclick="removeObjectStyle()">Reset Style</button>

          <div class="badge-edit-box">
            <label>Badge Text</label>
            <input
              type="text"
              id="badgeTextInput"
              placeholder="SALE / OFFER / 50% OFF"
            />

            <label>Badge Text Color</label>
            <input type="color" id="badgeTextColorInput" value="#ffffff" />

            <label>Badge Text Size</label>
            <input
              type="range"
              id="badgeTextSizeInput"
              min="12"
              max="80"
              value="34"
            />
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="editor-main">
        <!-- TOPBAR -->
        <header class="editor-topbar">
          <div class="top-left">
            <select id="sizePreset">
              <option value="instagram">Instagram</option>

              <option value="facebook">Facebook</option>

              <option value="flyer">Flyer</option>

              <option value="banner">Banner</option>

              <option value="thumbnail">Thumbnail</option>

              <option value="custom">Custom</option>
            </select>
          </div>

          <button onclick="newProject()">New Project</button>
          <button onclick="saveCurrentProject()">Save Project</button>
          <button onclick="openProjectsPanel()">Projects</button>

          <div class="top-center">
            <button onclick="zoomOut()">−</button>

            <span id="zoomLabel">55%</span>

            <button onclick="zoomIn()">+</button>
          </div>

          <div class="top-right">
            <button onclick="downloadPoster()">Download</button>
          </div>
        </header>

        <!-- CANVAS -->
        <section class="canvas-area">
          <div class="canvas-scroll">
            <div class="canvas-holder">
              <canvas id="posterCanvas"></canvas>
            </div>
          </div>
        </section>
      </main>
    </div>

    <!-- MOBILE NAV -->
    <nav class="mobile-editor-nav">
      <button onclick="openPanel('textPanel')">✏️</button>

      <button onclick="openPanel('assetsPanel')">🧩</button>

      <button onclick="openPanel('imagePanel')">🖼️</button>

      <button onclick="openPanel('backgroundPanel')">🎨</button>

      <button onclick="openPanel('layersPanel')">📚</button>
    </nav>

    <input type="file" id="imageUpload" hidden />
    <input type="file" id="logoUpload" hidden />
    <input type="file" id="backgroundUpload" hidden />

    <div id="objectMiniToolbar" class="object-mini-toolbar">
      <button class="tool-pill" onclick="openSelectedObjectEditor()">
        ✏️ Edit
      </button>

      <button class="tool-icon" onclick="duplicateSelected()">⧉</button>

      <button class="tool-icon" onclick="deleteSelected()">🗑</button>

      <button class="tool-icon" onclick="toggleMoreMenu()">⋯</button>
    </div>

    <div id="moreMenu" class="more-menu">
      <button onclick="bringForwardObject()">Bring Forward</button>
      <button onclick="sendBackwardObject()">Send Backward</button>
      <button onclick="lockSelected()">Lock</button>
      <button onclick="unlockSelected()">Unlock</button>
    </div>

    <div id="moreMenu" class="more-menu">
      <button onclick="bringForwardObject()">Bring Front</button>

      <button onclick="sendBackwardObject()">Send Back</button>

      <button onclick="lockSelected()">Lock</button>

      <button onclick="unlockSelected()">Unlock</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="js/fontLibrary.js"></script>
<script src="js/textEffects.js"></script>
<script src="js/badgeLibrary.js"></script>
<script src="js/editor.js"></script>
  </body>
</html>
