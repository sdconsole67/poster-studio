<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Poster Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Anton&family=Archivo+Black&family=Bebas+Neue&family=Cinzel:wght@400;700&family=Exo+2:wght@400;700&family=Montserrat:wght@400;500;700;900&family=Noto+Sans+Bengali:wght@400;700;900&family=Orbitron:wght@400;700&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Poppins:wght@400;500;700;900&family=Raleway:wght@400;700;900&family=Russo+One&family=Teko:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="pro-editor">

    <aside class="editor-panel left-panel">
      <div class="panel-title">
        <h2>Editor</h2>
        <p>Customize your poster</p>
      </div>

      <div class="tool-section">
        <h3>Text</h3>

        <label>Selected Text</label>
        <input type="text" id="textInput" placeholder="Select text first" />

        <label>Font Family</label>
        <select id="fontFamilyInput">

  <option value="Montserrat">Montserrat</option>
  <option value="Poppins">Poppins</option>
  <option value="Anton">Anton</option>
  <option value="Bebas Neue">Bebas Neue</option>
  <option value="Oswald">Oswald</option>

  <option value="Raleway">Raleway</option>
  <option value="Teko">Teko</option>
  <option value="Orbitron">Orbitron</option>
  <option value="Cinzel">Cinzel</option>
  <option value="Playfair Display">Playfair Display</option>

  <option value="Merriweather">Merriweather</option>
  <option value="Lobster">Lobster</option>
  <option value="Abril Fatface">Abril Fatface</option>
  <option value="Bangers">Bangers</option>
  <option value="Permanent Marker">Permanent Marker</option>

  <option value="Russo One">Russo One</option>
  <option value="Archivo Black">Archivo Black</option>
  <option value="Alfa Slab One">Alfa Slab One</option>
  <option value="Fredoka">Fredoka</option>
  <option value="DM Serif Display">DM Serif Display</option>

  <option value="Exo 2">Exo 2</option>
  <option value="Sora">Sora</option>
  <option value="Barlow Condensed">Barlow Condensed</option>
  <option value="Kanit">Kanit</option>
  <option value="Space Grotesk">Space Grotesk</option>

  <option value="Noto Sans Bengali">Noto Sans Bengali</option>

</select>

        <label>Font Size</label>
        <input type="range" id="fontSizeInput" min="16" max="180" value="60" />

        <label>Letter Spacing</label>
        <input type="range" id="letterSpacingInput" min="-50" max="250" value="0" />

        <label>Text Color</label>
        <input type="color" id="colorInput" value="#ffffff" />

        <button onclick="updateSelectedText()">Update Text</button>
        <button onclick="addText()">Add Text</button>
      </div>

      <div class="tool-section">
  <h3>Background</h3>

  <label>Upload Background Photo</label>
  <input type="file" id="backgroundUpload" accept="image/*" />

  <label>Background Color</label>
  <input type="color" id="bgColorInput" value="#05070d" />

  <label>Gradient Start</label>
  <input type="color" id="gradientStartInput" value="#05070d" />

  <label>Gradient End</label>
  <input type="color" id="gradientEndInput" value="#1a1f35" />

  <button onclick="applyBackgroundColor()">Apply Background Color</button>
  <button onclick="applyGradientBackground()">Apply Gradient</button>
</div>

      <div class="tool-section">
        <h3>Arrange</h3>

        <button onclick="bringForward()">Bring Forward</button>
        <button onclick="sendBackward()">Send Backward</button>
        <button onclick="deleteSelected()">Delete Selected</button>
      </div>
    </aside>

    <main class="editor-stage">

      <div class="top-toolbar">
        <button onclick="fitCanvas()">Fit</button>
        <button onclick="zoomOut()">−</button>
        <span id="zoomLabel">100%</span>
        <button onclick="zoomIn()">+</button>
        <button class="export-btn" onclick="downloadPoster()">Download HD</button>
      </div>

      <div class="stage-scroll">
        <div class="canvas-frame">
          <canvas id="posterCanvas"></canvas>
        </div>
      </div>

    </main>

    <aside class="editor-panel right-panel">
      <div class="panel-title">
        <h2>Layers</h2>
        <p>Select and manage objects</p>
      </div>

      <div id="layerList" class="layer-list"></div>
    </aside>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

  <script src="js/layouts.js"></script>
  <script src="js/renderPoster.js"></script>
  <script src="js/editor.js"></script>

</body>
</html>
